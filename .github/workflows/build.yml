name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version:
          - "1.21"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify Go Version
        run: go version

      - name: Download Dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run Vet
        run: go vet ./...

      - name: Run Tests
        run: go test ./...

      - name: Build
        run: go build -v ./...

      - name: Build Binary
        run: |
          mkdir -p bin
          go build -o bin/tasks .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasks-linux-amd64
          path: bin/tasks
